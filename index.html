<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 Calculadora do Amor Suprema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57, #ff9ff3, #54a0ff);
            background-size: 400% 400%;
            animation: rainbowBg 8s ease infinite;
        }
        
        @keyframes rainbowBg {
            0%, 100% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
        }
        
        .title-font {
            font-family: 'Fredoka One', cursive;
        }
        
        .heart-bounce {
            animation: heartBounce 2s ease-in-out infinite;
        }
        
        @keyframes heartBounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-15px) scale(1.1); }
            60% { transform: translateY(-8px) scale(1.05); }
        }
        
        .sparkle {
            animation: sparkle 1.5s ease-in-out infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.7; transform: scale(1.2) rotate(180deg); }
        }
        
        .result-pop {
            animation: resultPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes resultPop {
            0% { opacity: 0; transform: scale(0.3) rotate(-10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        
        .rainbow-border {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57, #ff9ff3);
            background-size: 400% 400%;
            animation: rainbowBorder 3s ease infinite;
            padding: 3px;
            border-radius: 20px;
        }
        
        @keyframes rainbowBorder {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .love-meter-rainbow {
            background: linear-gradient(90deg, 
                #ff0000 0%, #ff4500 10%, #ffa500 20%, #ffff00 30%, 
                #9acd32 40%, #00ff00 50%, #00ffff 60%, #0000ff 70%, 
                #8a2be2 80%, #ff1493 90%, #ff69b4 100%);
            background-size: 200% 100%;
            animation: rainbowFlow 2s linear infinite;
        }
        
        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .floating-heart {
            position: absolute;
            animation: floatUp 4s linear infinite;
            font-size: 20px;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(100vh) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) rotate(360deg);
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <div class="floating-hearts" id="floatingHearts"></div>
    
    <div class="rainbow-border">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-lg mx-auto">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="text-7xl mb-4 heart-bounce">💖</div>
                <h1 class="title-font text-4xl font-bold bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 bg-clip-text text-transparent mb-2">
                    Calculadora do Amor
                </h1>
                <div class="flex justify-center space-x-2 mb-3">
                    <span class="sparkle">✨</span>
                    <span class="sparkle" style="animation-delay: 0.3s">🌟</span>
                    <span class="sparkle" style="animation-delay: 0.6s">💫</span>
                </div>
                <p class="text-gray-600 font-semibold">Versão Suprema com Mais Cores e Precisão!</p>
            </div>
            
            <!-- Form -->
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-purple-700 mb-2">
                        🌹 Primeira pessoa
                    </label>
                    <input 
                        type="text" 
                        id="person1" 
                        placeholder="Digite o primeiro nome..."
                        class="w-full px-4 py-3 border-3 border-pink-300 rounded-xl focus:border-purple-500 focus:outline-none transition-all duration-300 text-gray-700 bg-gradient-to-r from-pink-50 to-purple-50"
                    >
                </div>
                
                <div class="text-center">
                    <div class="text-3xl heart-bounce" style="animation-delay: 0.5s">💕</div>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-purple-700 mb-2">
                        🌹 Segunda pessoa
                    </label>
                    <input 
                        type="text" 
                        id="person2" 
                        placeholder="Digite o segundo nome..."
                        class="w-full px-4 py-3 border-3 border-pink-300 rounded-xl focus:border-purple-500 focus:outline-none transition-all duration-300 text-gray-700 bg-gradient-to-r from-purple-50 to-pink-50"
                    >
                </div>
                
                <button 
                    onclick="calculateLove()" 
                    class="w-full bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 text-white font-bold py-4 px-6 rounded-xl hover:from-pink-600 hover:via-purple-600 hover:to-blue-600 transform hover:scale-105 transition-all duration-300 shadow-xl text-lg"
                >
                    🌈 Calcular Compatibilidade Suprema 🌈
                </button>
            </div>
            
            <!-- Result -->
            <div id="result" class="hidden mt-8 text-center result-pop">
                <div class="rainbow-border">
                    <div class="bg-white rounded-xl p-6">
                        <div class="text-6xl mb-4" id="resultEmoji">💕</div>
                        <div class="title-font text-4xl font-bold mb-2" id="percentage" style="background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #feca57, #ff9ff3); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">0%</div>
                        
                        <!-- Barra de compatibilidade colorida -->
                        <div class="bg-gray-200 h-6 rounded-full mb-4 overflow-hidden shadow-inner">
                            <div id="loveMeterFill" class="love-meter-rainbow h-full transition-all duration-2000 ease-out" style="width: 0%"></div>
                        </div>
                        
                        <div class="text-xl font-bold text-gray-800 mb-3" id="resultNames"></div>
                        <div class="text-lg text-gray-700 mb-2" id="resultMessage"></div>
                        <div class="text-sm text-gray-600 italic" id="resultSubMessage"></div>
                        
                        <!-- Estatísticas extras -->
                        <div class="mt-4 grid grid-cols-2 gap-4 text-sm">
                            <div class="bg-gradient-to-r from-pink-100 to-purple-100 p-3 rounded-lg">
                                <div class="font-bold text-purple-700">Química</div>
                                <div id="chemistry" class="text-lg font-bold">0%</div>
                            </div>
                            <div class="bg-gradient-to-r from-blue-100 to-green-100 p-3 rounded-lg">
                                <div class="font-bold text-blue-700">Futuro</div>
                                <div id="future" class="text-lg font-bold">0%</div>
                            </div>
                        </div>
                        
                        <button 
                            onclick="resetCalculator()" 
                            class="mt-6 bg-gradient-to-r from-gray-400 to-gray-600 hover:from-gray-500 hover:to-gray-700 text-white font-bold py-3 px-6 rounded-lg transition-all duration-300 transform hover:scale-105"
                        >
                            🔄 Nova Consulta Amorosa
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cria corações flutuantes
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = ['💖', '💕', '💗', '💘', '💝', '💞', '💟', '❤️', '🧡', '💛', '💚', '💙', '💜'][Math.floor(Math.random() * 13)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.animationDelay = Math.random() * 2 + 's';
            
            document.getElementById('floatingHearts').appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }
        
        // Cria corações a cada 800ms
        setInterval(createFloatingHeart, 800);

        function calculateLove() {
            const person1 = document.getElementById('person1').value.trim();
            const person2 = document.getElementById('person2').value.trim();
            
            if (!person1 || !person2) {
                alert('Por favor, digite os dois nomes para a magia acontecer! 🌈💕');
                return;
            }
            
            // Algoritmo mais complexo para mais variações
            const combined = (person1 + person2).toLowerCase();
            let hash = 0;
            
            for (let i = 0; i < combined.length; i++) {
                const char = combined.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            // Gera porcentagem mais precisa (1-100%)
            const percentage = Math.abs(hash % 100) + 1;
            
            // Gera estatísticas extras
            const chemistry = Math.abs((hash * 7) % 100) + 1;
            const future = Math.abs((hash * 13) % 100) + 1;
            
            // Determina emoji e mensagens baseado na porcentagem com mais variações
            let emoji, message, subMessage;
            
            if (percentage >= 95) {
                emoji = '👑💖';
                message = 'PERFEIÇÃO ABSOLUTA! Vocês são o casal do século! 🌟';
                subMessage = 'As estrelas se alinharam para vocês! ✨🌙';
            } else if (percentage >= 90) {
                emoji = '💖✨';
                message = 'Combinação ÉPICA! Almas gêmeas confirmadas! 🔥';
                subMessage = 'O universo conspirou a favor de vocês! 🌌';
            } else if (percentage >= 85) {
                emoji = '😍🌹';
                message = 'INCRÍVEL! Vocês são feitos um para o outro! 💫';
                subMessage = 'Amor de conto de fadas! 👑';
            } else if (percentage >= 80) {
                emoji = '🥰💕';
                message = 'Compatibilidade FANTÁSTICA! Que química! ⚡';
                subMessage = 'Preparem-se para uma jornada mágica! 🎭';
            } else if (percentage >= 75) {
                emoji = '😊🌈';
                message = 'EXCELENTE match! O amor está no ar! 🎈';
                subMessage = 'Vocês têm tudo para dar certo! 🍀';
            } else if (percentage >= 70) {
                emoji = '😄💝';
                message = 'Muito compatíveis! Há faíscas voando! ⚡';
                subMessage = 'A paixão está garantida! 🔥';
            } else if (percentage >= 65) {
                emoji = '😌🌸';
                message = 'Boa compatibilidade! Potencial romântico alto! 📈';
                subMessage = 'Com carinho, tudo é possível! 💐';
            } else if (percentage >= 60) {
                emoji = '🙂💫';
                message = 'Compatibilidade promissora! Vale a pena investir! 💰';
                subMessage = 'O tempo dirá se é amor verdadeiro! ⏰';
            } else if (percentage >= 55) {
                emoji = '🤗🌺';
                message = 'Há potencial! Vocês podem se surpreender! 🎁';
                subMessage = 'Às vezes o amor cresce devagar! 🌱';
            } else if (percentage >= 50) {
                emoji = '🤔💭';
                message = 'Na média! Pode rolar uma amizade colorida! 🌈';
                subMessage = 'Quem sabe não vira algo mais? 🤷‍♀️';
            } else if (percentage >= 45) {
                emoji = '😐🤝';
                message = 'Compatibilidade moderada. Amizade garantida! 👫';
                subMessage = 'Melhor não forçar a barra... 😅';
            } else if (percentage >= 40) {
                emoji = '😬🌪️';
                message = 'Hmm... pode ser complicado! Cuidado! ⚠️';
                subMessage = 'Talvez seja melhor como conhecidos! 👋';
            } else if (percentage >= 35) {
                emoji = '😅💨';
                message = 'Eita! Vocês são bem diferentes! 🌊';
                subMessage = 'Opostos se atraem... ou não! 🧲';
            } else if (percentage >= 30) {
                emoji = '😰🌧️';
                message = 'Opa! Melhor manter distância! 🚧';
                subMessage = 'Às vezes é melhor ser só amigos! 🤝';
            } else if (percentage >= 25) {
                emoji = '😨⛈️';
                message = 'Cuidado! Pode dar problema! ⚡';
                subMessage = 'Melhor procurar outra pessoa! 🔍';
            } else if (percentage >= 20) {
                emoji = '😱🌪️';
                message = 'Socorro! Fujam um do outro! 🏃‍♂️💨';
                subMessage = 'Isso não vai dar certo mesmo! ❌';
            } else if (percentage >= 15) {
                emoji = '💀⚡';
                message = 'PERIGO! Incompatibilidade total! 🚨';
                subMessage = 'Melhor nem tentar! 🚫';
            } else if (percentage >= 10) {
                emoji = '🌋💥';
                message = 'CATÁSTROFE amorosa! Corram! 🏃‍♀️💨';
                subMessage = 'Vocês são como água e óleo! 💧🛢️';
            } else {
                emoji = '💔🌪️';
                message = 'APOCALIPSE do amor! Impossível! 🌪️';
                subMessage = 'Nem em universos paralelos! 🌌❌';
            }
            
            // Exibe os resultados com animação
            document.getElementById('percentage').textContent = percentage + '%';
            document.getElementById('resultEmoji').textContent = emoji;
            document.getElementById('resultNames').textContent = `${person1} 💕 ${person2}`;
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('resultSubMessage').textContent = subMessage;
            document.getElementById('chemistry').textContent = chemistry + '%';
            document.getElementById('future').textContent = future + '%';
            
            // Anima as barras
            setTimeout(() => {
                document.getElementById('loveMeterFill').style.width = percentage + '%';
            }, 500);
            
            // Mostra o resultado
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            
            // Cria explosão de corações
            for (let i = 0; i < 10; i++) {
                setTimeout(() => createFloatingHeart(), i * 100);
            }
        }
        
        function resetCalculator() {
            document.getElementById('person1').value = '';
            document.getElementById('person2').value = '';
            document.getElementById('result').classList.add('hidden');
            document.getElementById('loveMeterFill').style.width = '0%';
            document.getElementById('person1').focus();
        }
        
        // Permite calcular pressionando Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateLove();
            }
        });
        
        // Foca no primeiro campo ao carregar
        window.onload = function() {
            document.getElementById('person1').focus();
        };
    </script>

</html>
